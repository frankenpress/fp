name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: go mod download
        run: go mod download

      - name: go test
        run: go test -race -count=1 -v ./...

      - name: go build
        run: go build -o /tmp/fp ./cmd/fp

      - name: smoke — fp version
        run: /tmp/fp version

      - name: smoke — fp --help
        run: /tmp/fp --help
