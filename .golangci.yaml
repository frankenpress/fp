run:
  timeout: 5m

linters:
  enable:
    - gofmt
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused

linters-settings:
  revive:
    rules:
      - name: package-comments
      - name: exported
        disabled: false
      - name: var-naming
      - name: error-strings
        disabled: true   # we deliberately phrase error messages for human display
      - name: error-naming
      - name: context-as-argument

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - revive
